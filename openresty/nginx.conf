worker_processes auto;

env EDGE_SHARED_SECRET;
env APP_UPSTREAM_ORIGIN;
env STREAM_RELAY_ORIGIN;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  resolver 127.0.0.11 ipv6=off valid=30s;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;

  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_buffering off;
  proxy_request_buffering off;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  send_timeout 3600s;
  proxy_ssl_server_name on;

  server {
    listen 8090;
    server_name renttool.store www.renttool.store;

    location = /healthz {
      add_header Content-Type text/plain;
      return 200 "ok";
    }

    location = /_edge_auth {
      internal;

      set_by_lua_block $edge_secret {
        return os.getenv("EDGE_SHARED_SECRET") or ""
      }

      set_by_lua_block $app_upstream_origin {
        return os.getenv("APP_UPSTREAM_ORIGIN") or "http://host.docker.internal:8080"
      }

      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Edge-Secret $edge_secret;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Stream-Type $edge_stream_type;
      proxy_set_header X-Proxy-Username $edge_username;
      proxy_set_header X-Proxy-Password $edge_password;
      proxy_set_header X-Stream-Id $edge_stream_id;
      proxy_set_header X-Stream-Extension $edge_extension;
      proxy_pass $app_upstream_origin/internal/edge/authorize-stream;
    }

    location ~ ^/(live|movie|series)/([^/]+)/([^/]+)/([^/.]+)\.([A-Za-z0-9]+)$ {
      set $edge_stream_type $1;
      set $edge_username $2;
      set $edge_password $3;
      set $edge_stream_id $4;
      set $edge_extension $5;

      auth_request /_edge_auth;
      auth_request_set $edge_user_id $upstream_http_x_edge_user_id;

      set_by_lua_block $edge_secret {
        return os.getenv("EDGE_SHARED_SECRET") or ""
      }

      set_by_lua_block $stream_relay_origin {
        return os.getenv("STREAM_RELAY_ORIGIN") or "http://host.docker.internal:8081"
      }

      proxy_set_header X-Edge-Secret $edge_secret;
      proxy_set_header X-Edge-User-Id $edge_user_id;
      proxy_set_header X-Stream-Type $edge_stream_type;
      proxy_set_header X-Stream-Id $edge_stream_id;
      proxy_set_header X-Stream-Extension $edge_extension;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Range $http_range;
      proxy_set_header If-Range $http_if_range;
      proxy_pass $stream_relay_origin/internal/edge/relay;
    }

    location / {
      set_by_lua_block $app_upstream_origin {
        return os.getenv("APP_UPSTREAM_ORIGIN") or "http://host.docker.internal:8080"
      }

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass $app_upstream_origin;
    }
  }
}
